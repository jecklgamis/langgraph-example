<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>langgraph-example</title>
  <link rel="stylesheet" href="/static/playground.css">
</head>
<body>

<div class="header">
  <div class="header-logo"></div>
  <h1>langgraph-example</h1>
</div>

<div class="chat-area" id="chatArea">
  <div class="messages" id="messages">
    <div class="empty-state" id="emptyState">
      <div class="gem"></div>
      <p>How can I help you today?</p>
    </div>
  </div>
</div>

<div class="input-area">
  <div>
    <div class="input-box">
      <textarea
        id="input"
        placeholder="Ask me anything..."
        onkeydown="handleKey(event)"
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/>
          <polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <div class="input-footer">langgraph-example can make mistakes. Verify important info.</div>
  </div>
</div>

<script src="/static/playground.js"></script>
</body>
</html>
