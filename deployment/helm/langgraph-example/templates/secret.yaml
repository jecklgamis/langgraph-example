{{- $hasSecrets := false }}
{{- range $key, $val := .Values.secrets }}
{{- if $val }}{{ $hasSecrets = true }}{{- end }}
{{- end }}
{{- if $hasSecrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "langgraph-example.fullname" . }}
  labels:
    {{- include "langgraph-example.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $val := .Values.secrets }}
  {{- if $val }}
  {{ $key }}: {{ $val | quote }}
  {{- end }}
  {{- end }}
{{- end }}
