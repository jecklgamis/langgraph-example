replicaCount: 1

image:
  repository: jecklgamis/langgraph-example
  tag: main
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  host: langgraph-example.local
  path: /
  tls: []

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

env:
  LLM_PROVIDER: "ollama"
  GUARDRAILS_ENABLED: "false"
  HUMAN_IN_LOOP: "false"

secrets:
  OPENAI_API_KEY: ""
  GEMINI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
  GROQ_API_KEY: ""
  MISTRAL_API_KEY: ""
  OPENROUTER_API_KEY: ""
  LANGCHAIN_API_KEY: ""
